  <script>
    // Embedded conversation from conversation.ts
    const conversation = [
      {
        id: 0,
        speaker: 'Jay',
        text: "What is the most beautiful thing ever created by mankind?"
      },
      {
        id: 1,
        speaker: 'Gemini',
        text: "That is one of those questions where the answer completely depends on who you ask, because humanity has created staggeringly beautiful things across completely different spectrums—from massive physical structures to invisible systems of thought.\n\nIf we break \"mankind's creations\" into a few distinct arenas, a handful of masterpieces consistently stand out as the pinnacle of human achievement:\n\n### 1. Architectural & Monumental Beauty\nWhen people think of breathtaking human creations, they often look to structures that blend engineering genius with deep emotional or spiritual resonance.\n* **The Taj Mahal (Agra, India):** Often called a \"teardrop on the cheek of time.\" Built entirely of white marble that changes color depending on the time of day, its perfect symmetry was born out of profound grief and love.\n* **The Sagrada Família (Barcelona, Spain):** Antoni Gaudí’s unfinished basilica feels less like a building and more like a living, breathing stone forest. The way the stained glass filters natural light into a hyper-vibrant spectrum of color inside is otherworldly.\n\n### 2. Artistic & Expressive Beauty\nThen there are creations that captured the depth of human emotion, psychology, and the natural world using nothing but paint, marble, or sound.\n* **Michelangelo’s David:** Carved from a single, discarded block of flawed marble, it is so anatomically precise and lifelike that it feels as though the stone is breathing.\n* **Beethoven’s Ninth Symphony:** A monumental achievement in music, composed when Beethoven was completely deaf. He couldn't even hear the thunderous applause at its premiere, yet he created a timeless anthem of universal human brotherhood.\n\n### 3. Intellectual & Conceptual Beauty\nSome of the most beautiful things we’ve built can't be touched or seen. They are frameworks that allowed us to understand our place in the cosmos.\n* **The Theory of General Relativity:** Albert Einstein’s elegant field equation fundamentally changed how we view reality. It revealed that space and time aren't just a static background, but a dynamic, flexible fabric woven together and bent by mass. It is a masterpiece of pure logic.\n* **Language and Mathematics:** The ultimate foundational creations. The fact that humans invented symbolic systems allowing us to transmit complex, abstract thoughts across thousands of years—or calculate the trajectory of a spacecraft—is a beautiful miracle in itself.\n\nUltimately, the \"most beautiful\" creation might just be the collective human drive to create art, meaning, and order out of chaos in the first place.\n\nWhat kind of beauty moves you the most? Are you captivated more by massive physical monuments, emotional works of art, or the elegance of scientific discovery?"
      },
      {
        id: 2,
        speaker: 'Jay',
        text: "Please break down and explain Albert Einstein's theory of general relativity."
      },
      {
        id: 3,
        speaker: 'Gemini',
        text: "At its core, Albert Einstein’s Theory of General Relativity (published in 1915) is a theory of gravity. But instead of viewing gravity as an invisible pulling force between objects—the way Isaac Newton did—Einstein realized that gravity is actually the warping or bending of the fabric of space and time.\n\nTo understand how it works, we have to look at the universe through Einstein's eyes, breaking it down into a few foundational concepts.\n\n### 1. The Fabric: Spacetime\nBefore Einstein, people thought of space as an empty, unchanging stage where events happened, and time as a clock ticking at the exact same rate everywhere in the universe.\nEinstein merged them into a single, four-dimensional continuum called spacetime (three dimensions of space, one dimension of time). He realized that spacetime isn't an empty stage; it is flexible, dynamic, and can be stretched, twisted, and bent.\n\n### 2. Gravity as Geometry (The Trampoline Analogy)\nTo visualize general relativity, imagine a tightly stretched trampoline.\n* If you place a heavy bowling ball in the center, it creates a deep dip or sag in the fabric.\n* If you then roll a small marble across the trampoline, it won't move in a straight line. It will roll down into the dip and orbit around the bowling ball.\n\nIn the universe, the bowling ball is a massive object like the Sun, and the marble is Earth. The Sun doesn't \"pull\" on the Earth with an invisible rope; the Sun's mass warps the spacetime around it, and the Earth is simply following the straightest possible path through that curved space.\n\nAs physicist John Wheeler famously summarized: \"Matter tells spacetime how to curve; spacetime tells matter how to move.\"\n\n### 3. The Math: The Einstein Field Equations\nFor those who appreciate the mathematical elegance, Einstein captured this entire relationship in a remarkably concise set of equations. While it looks like a single equation, it is actually a system of 10 interconnected tensor equations. Here is what the pieces mean:\n* **The Left Side:** Describes the geometry of spacetime (its curvature, shape, and cosmic expansion).\n* **The Right Side:** Describes the energy and momentum present (the matter, radiation, and pressure causing the warping).\n* **The Constants:** Newton's gravitational constant G and the speed of light c. Because the speed of light is so massive, this fraction is incredibly small. This tells us that spacetime is incredibly rigid—it takes a massive amount of energy or matter (like a star or a black hole) to warp it noticeably.\n\n### 4. Mind-Bending Consequences of the Theory\nBecause space and time are linked, warping space also warps time. General relativity predicted several wild phenomena that have all since been proven true:\n* **Gravitational Time Dilation:** Time passes slower in stronger gravitational fields. A clock on the surface of Earth ticks slightly slower than a clock floating in deep space.\n* **Gravitational Lensing:** Because space is curved, light traveling past a massive object like a galaxy cluster gets bent. The galaxy acts like a giant magnifying glass, distorting and multiplying the image of stars behind it.\n* **Black Holes:** If you pack enough mass into a small enough space, the warp in spacetime becomes a bottomless pit. Not even light can escape its gravitational curve.\n* **Gravitational Waves:** When massive objects accelerate (like two black holes colliding), they create ripples in the fabric of spacetime itself, traveling across the universe like ripples on a pond. We detected these for the first time in 2015.\n\nDoes the geometry of spacetime make sense, or would you like to dive deeper into one of its specific consequences, like how time slows down near a black hole?"
      },
      {
        id: 4,
        speaker: 'Jay',
        text: "Please go further into detail about the mind-bending consequences of the theory."
      },
      {
        id: 5,
        speaker: 'Gemini',
        text: "When you move away from standard Newtonian physics and enter Einstein's universe, reality starts to behave less like a rigid grid and more like fluid geometry.\n\nHere is a deeper dive into the most profound, mind-bending consequences of General Relativity.\n\n### 1. Gravitational Time Dilation (Time is Relative)\nIn General Relativity, time is not a universal constant. It is elastic. Because space and time are woven together as \"spacetime,\" whenever mass warps space, it stretching and slows down time as well.\nThe stronger the gravitational pull (the closer you are to a massive object), the slower time passes relative to someone in a weaker gravitational field.\n* **The Extreme Example:** If you were to hover just outside the event horizon of a supermassive black hole for what felt like one hour to you, back on Earth, decades or even centuries could pass. You would essentially fast-forward into the future of the universe.\n* **The Everyday Example:** This isn't just science fiction; it affects technology we use every day. Earth's gravity is slightly weaker up where GPS satellites orbit than it is down on the surface. Because of this, satellite clocks run about 45 microseconds faster per day than clocks on the ground. Engineers have to deliberately program relativity equations into GPS software to slow the satellite clocks down, or your phone's navigation map would drift out of alignment by miles every single day.\n\n### 2. Gravitational Lensing (Nature's Cosmic Magnifying Glass)\nWe usually think of light traveling in a perfectly straight line. But if light passes by an incredibly massive object—like a cluster of thousands of galaxies—it encounters a massive dip in spacetime. The light follows the curve of that dip, bending as it travels.\nThis creates a phenomenon called gravitational lensing. The massive foreground object acts exactly like a giant glass lens in a telescope.\n* It magnifies and distorts the light of objects sitting directly behind it.\n* Sometimes, it splits the light of a single distant galaxy into multiple images, or smears it into a perfect glowing ring of light known as an Einstein Ring.\n* Astronomers use this consequence today to map out dark matter, seeing the invisible mass by observing how dramatically it warps the light passing through it.\n\n### 3. Black Holes and Singularity (The Point of No Return)\nEinstein’s equations showed that if you pack enough mass into a tight enough space, the gravity becomes so intense that the escape velocity required to break free exceeds the speed of light. Since nothing can travel faster than light, nothing—not even light itself—can escape. This is a black hole.\n* **The Event Horizon:** This is the literal boundary of the black hole. Think of it less as a physical surface and more as a crossing point. Once an object passes the event horizon, all paths through warped spacetime twist inward. Moving \"outward\" becomes as physically impossible as moving \"backward in time.\"\n* **The Singularity:** At the very center of a black hole, the mathematics of General Relativity suggest that matter is crushed into an infinitely small point with infinite density. At this point, the curvature of spacetime becomes infinite. When equations return \"infinity,\" it means our current understanding of physics has completely broken down. To truly solve what happens at the center, relativity must eventually be married with quantum mechanics.\n\n### 4. Gravitational Waves (Ripples in Reality)\nIf you accelerate a charge in an electric field, you get electromagnetic waves (light, radio waves, X-rays). Einstein predicted that the same thing should happen with gravity. If you violently accelerate massive objects, they should shake the very fabric of spacetime, sending out literal ripples through the universe at the speed of light.\nFor a century, this was entirely theoretical because spacetime is incredibly rigid; it takes an unfathomable amount of energy to make it ripple noticeably.\nHowever, in 2015, the LIGO (Laser Interferometer Gravitational-Wave Observatory) experiment detected them for the first time. Two massive black holes, millions of light-years away, spiraled into each other and collided. The resulting gravitational waves traveled across the cosmos and physically stretched and compressed the Earth by a fraction of the width of an atomic nucleus as they passed through us. We didn't see this event with light; we felt the fabric of space vibrate.\n\n### 5. Frame Dragging (The Cosmic Whirlpool)\nThink back to the trampoline analogy, but imagine the heavy bowling ball is also spinning incredibly fast. As it spins, the friction of its surface would catch the fabric of the trampoline and twist it into a spiral whirlpool.\nThis happens in real life. It’s called frame dragging (or the Lense-Thirring effect). Any massive, rotating object literally drags the very fabric of space and time around with it. If you were orbiting a rapidly spinning black hole, space itself would be moving so violently that even if you fired your rockets at maximum power in the opposite direction, you would still be swept backward in the direction of the spin. Space itself forces your trajectory.\n\nOf all these wild distortions of space and time, which one feels the most counterintuitive to you?"
      },
      {
        id: 6,
        speaker: 'Jay',
        text: "So, I have been reading about the theory that we're living in a computer simulation right now and it could be one of many iterations of computer simulations that when a civilization becomes advanced enough that it's inevitable that they create an alternate reality where the people that live in that reality don't know that it is virtual. Does Einstein's theory of relativity play any part or affect the theory that we're living in a simulation in any way?"
      },
      {
        id: 7,
        speaker: 'Gemini',
        text: "The Simulation Hypothesis—the idea popularized by philosopher Nick Bostrom that we might be living in a high-fidelity virtual ancestor simulation—intersects with Albert Einstein’s Theory of General Relativity in some incredibly fascinating ways.\n\nIf this universe is software, then the laws of physics are the source code. When programmers and physicists look at Einstein’s equations through the lens of computer science, they notice that the rules of relativity look a lot like clever optimization tricks, hardware limits, and rendering techniques you would use to build a massive, efficient simulation.\n\n### 1. The Speed of Light as a Hardware Processor Limit\nIn relativity, the speed of light is the absolute speed limit of the universe. Nothing can travel or transmit information faster than c (approximately 300,000 km/s).\nIf you were programming a universe, you would run into a massive problem: how do you calculate the interactions of trillions of objects simultaneously without crashing the system? You need a maximum clock speed.\n* In a simulation, the speed of light isn't a magical cosmic speed limit—it's the maximum processor speed of the host computer.\n* Information can only update across the grid at one pixel per clock cycle. The speed of light is literally the refresh rate of our spacetime fabric.\n\n### 2. Time Dilation as \"Lag\" under Heavy Computational Load\nAs we discussed, General Relativity proves that mass warps spacetime, and time slows down near massive objects (like black holes) or at extreme velocities.\nFrom a computer science perspective, this looks exactly like server lag.\n* When a rendering engine handles an area with an immense amount of data—like a black hole, where massive amounts of matter, energy, and gravitational calculations are crammed into a single point—the processing power required for that specific region skyrockets.\n* To prevent the host computer from crashing, the simulation slows down the local clock for that specific area. To an observer inside that high-mass zone, everything feels normal. But to the rest of the universe, that specific region is processing data at a much slower frame rate.\n\n### 3. The Rigidly Smooth Math vs. The \"Pixelated\" Universe\nThere is a massive, ongoing debate in modern physics that directly ties relativity to the simulation theory.\nEinstein’s General Relativity relies on a concept called smooth spacetime geometry. His equations assume that space and time are continuous, meaning you can divide a distance down infinitely into smaller and smaller pieces.\nHowever, computers cannot handle infinity. A computer requires a grid made of discrete bits, or \"pixels.\" If our universe is a simulation, there must be a minimum resolution. Physics actually has a theoretical candidate for this: The Planck Length (1.6 x 10^-35 meters) and The Planck Time (5.4 x 10^-44 seconds).\nIf space and time are found to be \"chunked\" or pixelated at the Planck scale, it would break Einstein's assumption of perfectly smooth geometry, but it would be a smoking gun for a digital, simulated reality.\n\n### 4. Gravitational Lensing and \"Frustum Culling\"\nIn video game development, programmers use a technique called frustum culling or lazy loading. The game engine only renders the graphics that the player is actively looking at. If you turn around, the world behind you disappears or drops in resolution to save memory.\nIn our universe, look at Gravitational Lensing. As light travels through empty space across billions of light-years, it doesn't bother interacting or calculating its final form until it hits a massive gravitational warp or an observer's telescope. The universe bends the light dynamically based on the geometry it encounters along the way. It’s an incredibly efficient way to distribute light paths across vast distances without needing to pre-render the exact path of every photon in the cosmos.\n\n### The Ultimate Computational Catch: Vazza’s Energy Limit\nWhile these connections are mind-bending, relativity also provides the harshest argument against the simulation theory.\nIn 2025, an Italian astrophysicist named Franco Vazza calculated the sheer amount of information storage required to simulate the universe using the laws of relativity and thermodynamics. He found that to simulate even a small, low-resolution patch of our universe using our current understanding of physics, the creators would need to harness an astronomical amount of energy—essentially turning the mass of entire galaxy clusters into a giant computer.\nUnless the \"host universe\" operates on entirely different, unimaginable laws of physics where energy is infinite, Einstein's equations suggest that rendering our reality down to the atomic level is a monumentally expensive task.\n\nDoes looking at relativity as software architecture change how you think about things like time slowing down or the speed of light?"

hem?\nBiologically, your brain evolved to survive in a 3D environment. You cannot truly visualize a 4D spatial object. If you try to imagine a direction that is perpendicular to length, width, and height simultaneously, your brain short-circuits.\n\nHowever, we can completely understand them mathematically, and we can project their shadows into our world to grasp their geometry.\n\n**The Flatland Concept**\nTo fathom how a higher dimension interacts with us, we use a famous thought experiment from the 1884 novella Flatland. Imagine a universe that is a flat, 2D sheet of paper, inhabited by 2D stick figures. They can only move left, right, forward, and backward. They have no concept of \"up\" or \"down.\"\n\nIf a 3D human walks up to Flatland and pushes a solid 3D sphere through their paper universe, what do the Flatlanders see?\n\nThey cannot see the sphere. They only see what intersects with their 2D world. As the sphere passes through the paper, they would see a tiny dot appear out of nowhere, mysteriously grow into a solid circle, shrink back down to a dot, and vanish into thin air.\n\nIf we apply this to a 4D spatial object (like a Tesseract or hypercube) passing through our 3D room, we wouldn't see the whole object. We would see a bizarre, shape-shifting 3D geometric form materialize from nothing, morph in size and shape, and then pop out of existence. We can map this mathematically with perfect precision, even if we can't mentally picture it.\n\n### 3. Could Entities Exist in Them?\nIf higher dimensions exist, higher-dimensional entities are a distinct theoretical possibility. Following the Flatland logic, their capabilities would seem completely god-like to us.\n* **Omniscience and Omnipresence:** A 3D human looking down at a 2D Flatlander can see inside their locked houses, their closed safes, and even inside their 2D bodies all at once. A 4D entity looking \"down\" into our 3D world would see the inside of your locked bank vaults, the core of the Earth, and the inside of your stomach simultaneously, from a direction we cannot point to.\n* **Bypassing Our Physics:** If you trap a 2D Flatlander inside a circle drawn in pen, they are hopelessly imprisoned. But a 3D human can simply reach in from \"above,\" pick the Flatlander up, and place them outside the circle. To the other Flatlanders, their friend just instantly teleported through solid walls. A 4D entity could pull you out of a locked, windowless room without ever opening the door.\n* **Stepping Out of Time:** If time itself is just another dimension we are moving through, a higher-dimensional entity might view our entire timeline as a solid landscape. To them, your birth, your present moment, and your death aren't sequential events—they are just different coordinates on a map that they can look at all at once.\n\n### The Ultimate Irony\nIf there are entities living in higher dimensions, they might find our existence incredibly claustrophobic, trapped on a thin slice of spacetime. But just as we cannot interact with them directly, they might face a physical barrier interacting with us. The energy required for a higher-dimensional object to stabilize itself inside a lower-dimensional \"brane\" might be so immense that any contact would be fleeting, volatile, or entirely disruptive to our local physics.\n\nIf you could peer into a higher dimension for just a second, which would you want to experience first: a new direction in space that you've never traveled, or the ability to look at time as a physical map?"

k.\n* You could look to the \"left\" and see the violent, glowing ignition of the Big Bang.\n* You could look to the \"center\" and see galaxies spinning, stars forming, and the tiny blue dot of Earth buzzing with life.\n* You could look to the \"right\" and see the deep future—stars burning out, black holes slowly evaporating, and the universe expanding into a quiet, frozen expanse.\n\nNothing is \"happening\" or changing in the block universe. Change is just what we experience because our 3D brains are forced to slide through the block like a needle reading a vinyl record. From the outside, the song is already entirely pressed into the wax.\n\n### The Philosophical Meltdown: Free Will vs. Destiny\nIf you were to look at time as a map, it would force you to confront the ultimate philosophical dilemma: Does free will exist?\nIf the future already exists as a physical coordinate on a map, then every choice you will ever make has already been made. The \"path\" is already paved.\n\nHowever, some physicists argue that a higher-dimensional view of time wouldn't show a single, solid highway. Instead, it might look like a massive, branching river delta. Every time a quantum event occurs or a decision is made, the map splits into multiple parallel lanes (the Many-Worlds Interpretation). From the higher dimension, you wouldn't just see your future; you would see a sprawling tree of every possible future that could ever happen.\n\nIf you were looking at this grand map of your own life, would you want to look ahead to see how your individual path ends, or would you purposely look away to keep the illusion of the mystery alive?"

e as a solid, navigable landscape.\n\n### Where Do the 11 Dimensions of String Theory Fit In?\nIf all possible timelines for our universe are wrapped up by the 6th dimension, why do physicists say String Theory needs 11?\n\nBecause dimensions 7 through 11 aren't just about our choices or our quantum outcomes—they are about different laws of physics entirely.\nIn String Theory, dimensions 7 through 10 are tiny, curled-up spatial dimensions (often visualized as complex geometric shapes called Calabi-Yau manifolds). The way these extra dimensions are shaped determines how the \"strings\" of the universe vibrate. Their shape dictates the speed of light, the strength of gravity, and the mass of an electron in that universe.\n\n* **The 7th Dimension:** A line connecting different universes that started with different Big Bangs and operate under entirely different laws of physics.\n* **The 8th Dimension:** A plane of these completely alien universes, showing all their branches and possibilities.\n* **The 11th Dimension (M-Theory):** The ultimate \"Master Dimension.\" In the late 1990s, physicist Edward Witten showed that if you add an 11th dimension, all the different, competing versions of String Theory unify perfectly. The 11th dimension is the \"bulk\" space—the infinite ocean in which all universes, with all possible laws of physics, and all possible timelines, float as membranes.\n\n### So, What is Beyond the 11th Dimension?\nIf the 11th dimension already contains every possible universe, with every possible set of physics laws, and every possible branching timeline... what could a 12th dimension even be?\n\nPhysicists have actually played with this idea. In a framework called F-Theory (pioneered by Cumrun Vafa), scientists introduced a 12-dimensional model.\nInterestingly, F-Theory doesn't add a new space for \"more possibilities.\" Instead, it adds a second dimension of time.\nIn a 12-dimensional universe with two dimensions of time, time doesn't just flow or branch l reality. This ultimate realm is simply the physical embodiment of every mathematical equation that can possibly exist. It is a flawless, eternal crystal of pure logic.\n\n### 3. The Paradox of \"White Noise\" (Looking at Nothing)\nThere is a fascinating concept in information theory: if you combine every single color of light in the visible spectrum, you don't get a hyper-vibrant explosion of color—you just get pure white light. If you play every musical note at the exact same volume simultaneously, you don't get a magnificent symphony—you get white noise.\nThe same rule applies to the ultimate reality:\n\"When every possibility is true, no individual possibility stands out.\"\nIf you were to look at a realm where a room is simultaneously completely full of chairs, completely empty, painted red, painted blue, existing in the future, and exploding in the past, the overlapping information cancels itself out. To an outside observer, the ultimate totality of everything looks exactly like a featureless, infinite void.\n\n### 4. The \"Holographic\" Perspective\nBecause looking at the whole thing directly results in a blinding void of infinite data, the only way to actually see it is to look at its projections.\nThink of the ultimate reality as a giant, high-dimensional hologram. The hologram itself just looks like a blurry, chaotic pattern on a piece of film. But when you shine a light through it at a specific angle, a perfect, crisp 3D image pops out.\nOur universe is that 3D image. You, sitting where you are right now, are a single, beautifully rendered slice of that infinite, frozen mathematical crystal. The ultimate reality looks like a cosmic library, and our universe is just one incredibly detailed sentence on a single page of one book.\n\nIf you could take a brief glimpse into that infinite void, would you want to zoom into a universe with completely alien laws of physics just to see what a different reality feels like, or would you want to look at the grand geometric shape of the whole thing?"

    // Synchronize Audio source when index or base path alters
    function syncAudioSource(shouldTriggerPlayback = true) {
      // Clear warnings
      errorBanner.classList.add('hidden');

      let baseUrl = audioBaseUrl;
      if (baseUrl && !baseUrl.endsWith('/')) {
        baseUrl += '/';
      }
      
      const targetSrc = `${baseUrl}segment_${conversation[currentIndex].id}.mp3`;
      
      // Ensure we don't reload or break state if clicking the already selected, loaded track
      const absoluteTarget = new URL(targetSrc, window.location.href).href;
      if (audio.src !== absoluteTarget) {
        audio.src = targetSrc;
        audio.load();
      }

      audio.playbackRate = playbackSpeed;

      if (isPlaying && shouldTriggerPlayback) {
        audio.play().catch(err => {
          console.warn("User action required or audio stream not fully loaded yet:", err);
        });
      } else if (!isPlaying) {
        audio.pause();
      }
      
      updateUI();
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      if (isPlaying) {
        audio.play().catch(err => {
          console.warn("Could not play audio track on toggle Play:", err);
          handleAudioError();
        });
      } else {
        audio.pause();
      }
      updateUI();
    }

    function jumpToTrack(idx) {
      if (idx >= 0 && idx < conversation.length) {
        currentIndex = idx;
        isPlaying = true;
        syncAudioSource();
        scrollToCurrent();
      }
    }

    function playPrevious() {
      if (currentIndex > 0) {
        currentIndex--;
        isPlaying = true;
        syncAudioSource();
        scrollToCurrent();
      }

      if (currentIndex < conversation.length - 1) {
        currentIndex++;
        isPlaying = true;
        syncAudioSource();
        scrollToCurrent();
      }
    }

    function handleAudioEnded() {
      if (currentIndex < conversation.length - 1) {
        currentIndex++;
        syncAudioSource();
        scrollToCurrent();
      } else {
        isPlaying = false;
        updateUI();
      }
    }

    function handleAudioError() {
      if (isPlaying) {
        const src = audio.src;
        const fileName = src.substring(src.lastIndexOf('/') + 1) || `segment_${conversation[currentIndex].id}.mp3`;
        
        errorMessage.innerText = `Could not play audio file "${fileName}". Please check that it is hosted correctly at your configured Base URL: "${audioBaseUrl}"`;
        errorBanner.classList.remove('hidden');
        
        isPlaying = false;
        updateUI();
      }

        toggleBall.classList.remove('translate-x-4');
        lightToggleText.classList.replace('text-slate-400', 'text-indigo-600');
        darkToggleText.classList.replace('text-indigo-400', 'text-slate-400');
      }
      updateUI();
    }

    // Scroll active item smoothly into middle alignment
    function scrollToCurrent() {
      setTimeout(() => {
        const activeElement = document.getElementById(`bubble-wrapper-${conversation[currentIndex].id}`);
        if (activeElement) {
          activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 150);
    }

    // Download segment file
    function downloadSegment() {
      let baseUrl = audioBaseUrl;
      if (baseUrl && !baseUrl.endsWith('/')) {
        baseUrl += '/';
      }
      const targetSrc = `${baseUrl}segment_${conversation[currentIndex].id}.mp3`;
      const a = document.createElement('a');
      a.href = targetSrc;
      a.download = `segment_${conversation[currentIndex].id}.mp3`;
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    // Re-render UI components based on interactive changes
    function updateUI() {
      // 1. Play-Pause button inner HTML
      if (isPlaying) {
        playPauseIcon.innerHTML = `
          <!-- Pause SVG -->
          <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        `;
        statusText.innerText = `${conversation[currentIndex].speaker} Speaking...`;
      } else {
        playPauseIcon.innerHTML = `
          <!-- Play SVG -->
          <svg class="w-6 h-6 fill-current ml-1" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
          </svg>
        `;
        statusText.innerText = 'Paused';
      }

      // 2. Adjust footer limits (Prev/Next buttons disabled state)
      btnPrev.disabled = (currentIndex === 0);
      btnNext.disabled = (currentIndex === conversation.length - 1);

      // 3. Current segment progress bar representation
      const progressPercent = (currentIndex / Math.max(1, conversation.length - 1)) * 100;
      progressBarFill.style.width = `${progressPercent}%`;
      segmentCounter.innerText = `Segment ${currentIndex + 1} / ${conversation.length}`;

      // 4. Update chat container items highlighted state
      conversation.forEach((msg) => {
        const isCurrent = (msg.id === conversation[currentIndex].id);
        const card = document.getElementById(`card-${msg.id}`);
        const wrap = document.getElementById(`bubble-wrapper-${msg.id}`);
        const waves = document.getElementById(`waves-${msg.id}`);
        const labelText = document.getElementById(`label-text-${msg.id}`);
        
        if (!card || !wrap) return;

        const isJay = msg.speaker === 'Jay';

        if (isCurrent) {
          // Speak Wave
          if (isPlaying) {
            waves.classList.remove('hidden');
          } else {
            waves.classList.add('hidden');
          }
          
          labelText.className = `text-[10px] font-bold uppercase tracking-widest ${isJay ? 'text-slate-400' : 'text-indigo-600 dark:text-indigo-400'}`;
          labelText.innerText = `${msg.speaker}${isPlaying ? ' is speaking' : ''}`;

          // Cards active selection highlights
          card.classList.remove('opacity-60', 'opacity-65', 'border-slate-250', 'dark:border-slate-800');
          card.style.transform = 'scale(1.02)';
          
          if (isJay) {
            card.className = `relative px-5 py-4 rounded-2xl max-w-[90%] sm:max-w-[85%] transition-all duration-500 text-sm cursor-pointer shadow-xl rounded-tr-none scale-[1.02] bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200 border-2 border-slate-300 dark:border-slate-700 shadow-slate-200/50 dark:shadow-slate-950/50`;
          } else {
            card.className = `relative px-5 py-4 rounded-2xl max-w-[90%] sm:max-w-[85%] transition-all duration-500 text-sm cursor-pointer shadow-xl rounded-tl-none scale-[1.02] bg-indigo-600 text-white border-2 border-indigo-400 dark:border-indigo-500 shadow-indigo-200/50 dark:shadow-indigo-900/20`;
          }
        } else {
          // Reset default inactive highlights
          waves.classList.add('hidden');
          labelText.className = 'text-[10px] font-bold uppercase tracking-widest text-slate-400';
          labelText.innerText = msg.speaker;

          card.style.transform = 'scale(1)';
          card.className = `relative px-5 py-4 rounded-2xl max-w-[90%] sm:max-w-[85%] transition-all duration-500 text-sm cursor-pointer border shadow-sm rounded-tr-none rounded-tl-none opacity-60 hover:opacity-100 ${
            isJay 
              ? 'bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 border-slate-200 dark:border-slate-800 rounded-tr-none' 
              : 'bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 border-slate-200 dark:border-slate-800 rounded-tl-none'
          }`;
        }
      });
    }

    // Run Engine
    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
